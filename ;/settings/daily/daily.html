<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report</title>
    <link rel="stylesheet" href="daily.css" />
    <!-- <script>
        console.log = function() {};
        console.table = function () {};
    </script> -->
  </head>
  <!-- oncontextmenu="return false;" -->
    <body oncontextmenu="return false;">
        <div class="container">
            <div class="header">
                <button class="highpose"></button>
                <button class="highafterpose">
                    <div class="reporttitle">ToDay</div>
                    <div class="reportdate"><strong class="date"></strong><strong>/</strong><strong class="monthy"></strong><strong>/</strong><strong class="year"></strong><strong>, </strong><strong class="Hours"></strong><strong>:</strong><strong class="Minutes"></strong><strong>:</strong><strong class="Seconds"></strong></div>
                </button>
            </div>
            <!-- end of header -->
            <div class="finance">
                <main>
                    <h1 class="finance-header">REPORT (<strong class="rp-dt"></strong>)</h1>
                    <div class="insights">
                        <div class="users">
                            <div class="middle">
                                <div class="lef">
                                    <h3 class="worked-title">Worked Time</h3>
                                    <h1 class="worked-time"><strong class="worked-hours">0</strong>h <strong class="worked-min">0</strong>m</h1>
                                </div>
                            </div>
                            <div class="user-time">
                                <small class="user-time-header" onclick="credits()">Time:</strong></small>
                                <small class="user-time-starting" onclick="credits()">Starting,<strong class="user-time-starting-time">0:0</strong></small>
                                <small class="user-time-ending" onclick="credits()">Ending,<strong class="user-time-ending-time">0:0</strong></small>
                            </div>
                            <div class="user-credits">
                                <small class="user-credits-header">Credits:</strong></small>
                                <small class="user-credits-starting">Starting,<strong class="user-credits-starting-now">0</strong></small>
                                <small class="user-credits-ending">Ending,<strong class="user-credits-starting-end">0</strong></small>
                            </div>
                        </div>
                        
                        <div class="total-number-subsription">
                            <div class="middle">
                                <div class="lef">
                                    <h3>Games</h3>
                                    <h1 class="sub-number1">$</h1>
                                    <h1 class="sub-number11">0</h1>
                                </div>
                                <div class="game-rate">
                                    <h3>Rate</h3>
                                    <h1 class="sub-number">Frw</h1>
                                    <h1 class="sub-number111">0</h1>
                                </div>
                            </div>
                        </div>
                        <div class="sales">
                            <div class="middle">
                                <div class="lef">
                                    <h3 class="pay-class">Cash In</h3>
                                    <h1>Frw <h1 id="cashreceived">0</h1></h1>
                                </div>
                            </div>
                        </div>
                        <!-- --------------- END OF SALES------------------- -->
                        <div class="expenses">
                            <div class="middle">
                                <div class="lef">
                                    <h3 class="cash-class">Cash out</h3>
                                    <h1>Frw <h1 id="cashout">0</h1></h1>
                                </div>
                            </div>
                        </div>
                        <!-- --------------- END OF EXPENSES------------------- -->
                        <div class="income">
                            <div class="middle">
                                <div class="lef">
                                    <h3>Income</h3>
                                    <h1>Frw<h1 id="profit">0</h1></h1>
                                </div>
                            </div>
                            <div class="added-balance">
                            </div> 
                        </div>
                        <!-- --------------- END OF INCOME------------------- -->
                    </div>
                    <h1 class="user-header">LogIn</h1>
                    <div class="logins">
                        <!-- --------------- END OF INCOME------------------- -->
                    </div>
                    <!-- Records -->
                    <div class="recent-order">
                        <h2 class="records-header">Records</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>No.</th>
                                    <th>Time</th>
                                    <th>Bet</th>
                                    <th>Win</th>
                                    <th>Income</th>
                                    <th>Balance</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                    <!-- new user id start -->
                    <div class="new-user-id-form1">
                        <h1 class="final-user-name1">PASSWORD</h1>
                        <div class="show-id1">
                            <h2 class="number-written" id="show-pass" onclick="showpass()">Show</h2>
                            <h2><input type="password" class="user-phone-input1" placeholder="Here!"></h2>
                        </div>
                        <div class="button-now">
                            <button type="button" class="finshed" onclick="backcredits()">back</button>
                            <button type="button" class="finshed" onclick="creditsdone()">change</button>
                        </div>
                    </div>
                    <!-- new user if end! --> 
                    <!-- numerical keypad start here -->
                    <div class="keypad">
                        <button class="key" id="keyboard" onclick="countClicks('7')">7</button>
                        <button class="key" id="keyboard" onclick="countClicks('8')">8</button>
                        <button class="key" id="keyboard" onclick="countClicks('9')">9</button>
                        <button class="key" id="keyboard" onclick="countClicks('4')">4</button>
                        <button class="key" id="keyboard" onclick="countClicks('5')">5</button>
                        <button class="key" id="keyboard" onclick="countClicks('6')">6</button>
                        <button class="key" id="keyboard" onclick="countClicks('1')">1</button>
                        <button class="key" id="keyboard" onclick="countClicks('2')">2</button>
                        <button class="key" id="keyboard" onclick="countClicks('3')">3</button>
                        <button class="key1" id="keyboard1" onclick="countClicksdlt()">Dlt</button>
                        <button class="key" id="lastkey" onclick="countClicks('0')">0</button>
                    </div>
                    <!-- numerical keypad end here -->

                </main>
                <!-- history button -->
                <div class="histroy-button">
                    <button class="hist-button" onclick="backtohistory()">BACK</button>
                </div>
            </div>
            <!-- end of users -->
        </div>
        <div class="link-tocall" onclick="infomation()"></div>
        <script src="daily.js"></script>
    </body>
</html>
